<div class="app-shell" [class.dark-theme]="isDark()">
  <header class="topbar">
    <div class="brand">Habit Tracker</div>
    <nav class="nav" aria-label="Primary navigation">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/login" routerLinkActive="active">Login</a>
    </nav>
  </header>

  <main class="content">
    <router-outlet />
  </main>

  <footer class="theme-footer" aria-label="Theme controls">
    <button
      type="button"
      class="theme-toggle"
      role="switch"
      [attr.aria-checked]="isDark()"
      [attr.aria-label]="isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
      (click)="toggleTheme()"
    >
      <span class="theme-icons" aria-hidden="true">
        <span class="theme-icon sun" [class.active]="!isDark()"></span>
        <span class="theme-icon moon" [class.active]="isDark()"></span>
      </span>
      <span class="theme-label">{{ isDark() ? 'Dark' : 'Light' }}</span>
      <span class="theme-track">
        <span class="theme-thumb" [class.is-dark]="isDark()"></span>
      </span>
    </button>
  </footer>
</div>
